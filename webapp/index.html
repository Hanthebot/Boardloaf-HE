<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boardloaf-HE Per-Key Calibration</title>
<style>
body { font-family: system-ui, sans-serif; background:#111; color:#ddd; margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; }
h1 { color:#4ade80; margin:5px 0; }
.hint { color:#888; font-size:12px; margin-bottom:10px; max-width:900px; text-align:center; }
button { background:#3b82f6; color:#fff; border:none; padding:8px 14px; font-size:13px; border-radius:5px; cursor:pointer; margin:3px; }
button:hover { background:#2563eb; }
button:disabled { background:#555; cursor:not-allowed; }
button.danger { background:#dc2626; }
button.warn { background:#f59e0b; }
button.sel { background:#16a34a; }
.controls { display:flex; flex-wrap:wrap; justify-content:center; max-width:900px; margin-bottom:10px; }
.kbd { display:grid; grid-template-columns:repeat(5,1fr); grid-auto-rows:auto; gap:6px; background:#1a1a1a; padding:15px; border-radius:8px; width:min(380px,90vw); box-sizing:border-box; }
.key { background:#2a2a2a; border-radius:5px; padding:4px; display:flex; flex-direction:column; align-items:center; border:2px solid transparent; cursor:pointer; transition:border-color .15s; width:64px; min-width:64px; box-sizing:border-box; }
.key.pressed { border-color:#4ade80; background:#059669; }
.key.selected { border-color:#f59e0b; box-shadow:0 0 6px #f59e0b; }
.key .lbl { font-size:9px; color:#aaa; }
.key .val { font-size:11px; font-weight:bold; margin:2px 0; color:#fff; }
.key .bar { width:100%; height:34px; background:#444; border-radius:2px; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end; }
.key .fill { width:100%; background:#60a5fa; }
.thumb-row { grid-column:1/-1; display:flex; gap:6px; margin-top:4px; }
.thumb-row .key { width:64px; min-width:64px; }
.thumb-row.left  { justify-content:flex-end; }
.thumb-row.right { justify-content:flex-start; }
.halves { display:flex; gap:30px; flex-wrap:wrap; justify-content:center; }
.half-label { text-align:center; color:#aaa; font-weight:bold; margin-bottom:6px; }
#log { width:100%; max-width:900px; height:100px; background:#000; color:#0f0; font-family:monospace; padding:8px; margin-top:12px; overflow-y:auto; font-size:11px; box-sizing:border-box; border-radius:4px; }
#status { font-size:12px; margin:4px 0 10px; padding:6px 12px; border-radius:4px; background:#fff1; }
.cfg-panel { background:#161616; border-radius:8px; padding:14px; margin-top:12px; max-width:780px; width:100%; box-sizing:border-box; }
.cfg-row { display:flex; align-items:center; gap:10px; margin:6px 0; flex-wrap:wrap; }
.cfg-row label { min-width:240px; font-size:12px; color:#aaa; }
.cfg-row input[type=range] { flex:1; min-width:160px; }
.cfg-row .val-cell { font-size:13px; color:#4ade80; min-width:55px; text-align:right; }
.apply-row { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
</style>
</head>
<body>
<h1>Boardloaf HE Per-Key Calibration</h1>
<div class="hint">WebHID. Chrome/Edge. VID 0xF00D, PID 0x0001. Plug in each half separately to calibrate.<br>
All sliders are <b>percentage of key travel</b> (0% = bottomed, 100% = at rest). Click a key, drag sliders, then Apply to All or Save.</div>
<div id="status">Not connected</div>
<div id="mode-indicator" style="font-size:14px;font-weight:bold;margin:4px 0 8px;padding:4px 16px;border-radius:4px;background:#1a1a1a;color:#888;">Mode: <span id="mode-text">Unknown</span></div>
<div class="controls">
    <button id="btn-connect">Connect</button>
    <button id="btn-half">Half: Left</button>
    <button id="btn-ping" disabled>Test Ping</button>
    <button id="btn-stream" disabled>Start Stream</button>
    <button id="btn-noise" disabled>Noise Floor</button>
    <button id="btn-bottom-on" disabled>Start Bottoming</button>
    <button id="btn-bottom-off" disabled class="warn">Finish Bottoming</button>
    <button id="btn-show" disabled>Show Calib</button>
    <button id="btn-clear" disabled class="danger">Clear Calib</button>
    <button id="btn-mode" disabled>Toggle Mode</button>
    <button id="btn-save" disabled class="sel">Save to EEPROM</button>
</div>
<div class="halves">
    <div>
        <div class="half-label" id="label-master">Left Half</div>
        <div class="kbd" id="grid-master"></div>
    </div>
</div>
<div id="log">Ready.</div>

<script>
const VID = 0xF00D, PID = 0x0001;
const UA_CONSOLE = 0xFF31, UA_RAW = 0xFF60;
const RAW_EPSIZE = 32;

let rawDev = null, consoleDev = null, streaming = false;
let selectedRC = null;
let selectedCalib = null;
let mode = 0;
let verboseLog = false;
let currentHalf = 'left'; // 'left' or 'right'

const STATUS = document.getElementById('status');
const LOG = document.getElementById('log');
function log(msg){ const t = new Date().toISOString().slice(11,23); LOG.innerHTML = `[${t}] ${msg}\n` + LOG.innerHTML; }
function vlog(msg){ if(verboseLog) log(msg); }
function setStatus(s){ STATUS.textContent = s; }

// === Half toggle ===
document.getElementById('btn-half').onclick = () => {
    currentHalf = currentHalf === 'left' ? 'right' : 'left';
    document.getElementById('btn-half').textContent = `Half: ${currentHalf === 'left' ? 'Left' : 'Right'}`;
    document.getElementById('label-master').textContent = currentHalf === 'left' ? 'Left Half' : 'Right Half';
    // Flip thumb alignment: left half thumbs align right (inward), right half thumbs align left
    const tr = document.querySelector('.thumb-row');
    if(tr) tr.className = 'thumb-row ' + currentHalf;
};

// === Percentage <-> raw conversion (whole percent) ===
const THRESH_MAX = 1023;
function pctToRaw16(pct){ return Math.round(pct * THRESH_MAX / 100); }
function raw16ToPct(raw){ return Math.round(raw * 100 / THRESH_MAX); }

function rtPctToRaw(pct){
    if(!selectedCalib || selectedCalib.travel <= 0) return 1;
    return Math.max(1, Math.min(255, Math.round(pct / 100 * selectedCalib.travel)));
}
function rtRawToPct(raw){
    if(!selectedCalib || selectedCalib.travel <= 0) return Math.round(raw * 100 / 255);
    return Math.round(raw * 100 / selectedCalib.travel);
}
function rtMaxPct(){
    if(!selectedCalib || selectedCalib.travel <= 0) return 100;
    return Math.min(100, Math.round(255 * 100 / selectedCalib.travel));
}

// === Grid construction (master half) ===
const masterKeys = [];
function makeKey(label, row, col){
    const k = document.createElement('div');
    k.className = 'key';
    k._row = row; k._col = col;
    const l = document.createElement('div'); l.className='lbl'; l.textContent=label;
    const v = document.createElement('div'); v.className='val'; v.textContent='---';
    const b = document.createElement('div'); b.className='bar';
    const f = document.createElement('div'); f.className='fill'; f.style.height='0%';
    b.appendChild(f); k.appendChild(l); k.appendChild(v); k.appendChild(b);
    k._val = v; k._fill = f;
    k.onclick = () => selectKey(row, col);
    return k;
}
const gridMaster = document.getElementById('grid-master');
for(let r=0;r<3;r++) for(let c=0;c<5;c++){
    const k = makeKey(`r${r}c${c}`, r, c);
    k.style.gridRow = r+1; k.style.gridColumn = c+1;
    gridMaster.appendChild(k); masterKeys[r*5+c]=k;
}
const thumbRow = document.createElement('div');
thumbRow.className = 'thumb-row left';
thumbRow.style.gridRow = 4; thumbRow.style.gridColumn = '1 / -1';
for(let t=0;t<3;t++){
    const k = makeKey(`T${t}`, t, 5);
    thumbRow.appendChild(k); masterKeys[15+t]=k;
}
gridMaster.appendChild(thumbRow);

// === Connect ===
document.getElementById('btn-connect').onclick = async () => {
    try {
        const picked = await navigator.hid.requestDevice({ filters: [{vendorId: VID, productId: PID}] });
        if(!picked.length){ setStatus('No device picked'); return; }
        const openDevs = [];
        for(const d of picked){ if(!d.opened) await d.open(); openDevs.push(d); }
        let nC=0, nR=0;
        for(const d of openDevs){
            const hasC = d.collections.some(c => c.usagePage === UA_CONSOLE);
            const hasR = d.collections.some(c => c.usagePage === UA_RAW);
            vlog(`Device: interfaces=${d.collections.length} console=${hasC} raw=${hasR}`);
            if(hasC){ consoleDev = d; d.addEventListener('inputreport', onConsole); nC++; }
            if(hasR){ rawDev = d; d.addEventListener('inputreport', onRawResp); nR++; }
        }
        setStatus(`Console=${nC} Raw=${nR}. ${nR?'Ready.':'No Raw HID.'}`);
        ['btn-ping','btn-stream','btn-noise','btn-bottom-on','btn-bottom-off','btn-show','btn-clear','btn-mode','btn-save'].forEach(id => document.getElementById(id).disabled = !rawDev);
        if(nR) customGet(1); // fetch current mode
    } catch(e){ setStatus('Error: '+e.message); }
};

// === VIA command helpers ===
function sendCmd(cmdId, chId, valueId, ...payload){
    if(!rawDev) return;
    const buf = new Uint8Array(RAW_EPSIZE);
    buf[0]=cmdId; buf[1]=chId; buf[2]=valueId;
    for(let i=0;i<payload.length && i+3<RAW_EPSIZE;i++) buf[3+i]=payload[i];
    rawDev.sendReport(0, buf).catch(e=>log('send err: '+e.message));
}
const customSet = (vid, ...p) => sendCmd(0x07, 0x00, vid, ...p);
const customGet = (vid, ...p) => sendCmd(0x08, 0x00, vid, ...p);

// === Ping ===
document.getElementById('btn-ping').onclick = () => {
    const b = new Uint8Array(RAW_EPSIZE); b[0]=0x01;
    rawDev.sendReport(0, b).then(()=>log('Ping sent')).catch(e=>log('ping err: '+e.message));
};

// === Calibration buttons ===
const btnStream = document.getElementById('btn-stream');
btnStream.onclick = () => {
    streaming = !streaming;
    customSet(12, streaming ? 1 : 0);
    btnStream.textContent = streaming ? 'Stop Stream' : 'Start Stream';
    log(streaming ? 'Stream ON' : 'Stream OFF');
};
document.getElementById('btn-noise').onclick = () => { customSet(9, 0); log('Sampling noise floor...'); };
document.getElementById('btn-bottom-on').onclick = () => { customSet(8, 1); log('Bottoming ON - press all keys fully'); };
document.getElementById('btn-bottom-off').onclick = () => { customSet(8, 0); log('Bottoming OFF - readings saved'); };
document.getElementById('btn-show').onclick = () => { customSet(10, 0); log('Calib data printed to console'); };
document.getElementById('btn-clear').onclick = () => { if(confirm('Clear all calibration?')) { customSet(11, 0); log('Calibration cleared'); } };
document.getElementById('btn-mode').onclick = () => { mode = mode ? 0 : 1; customSet(1, mode); updateModeDisplay(); log(`Mode → ${mode?'Rapid Trigger':'APC'}`); };
document.getElementById('btn-save').onclick = () => { customSet(4, 0); log('Saving to EEPROM...'); };

function updateModeDisplay(){
    const el = document.getElementById('mode-text');
    const wrap = document.getElementById('mode-indicator');
    if(mode === 0){ el.textContent = 'APC'; el.style.color = '#60a5fa'; wrap.style.background = '#1a2a1a'; }
    else { el.textContent = 'Rapid Trigger'; el.style.color = '#f59e0b'; wrap.style.background = '#2a1a1a'; }
}

// === Raw response handler ===
function onRawResp(event){
    const d = new Uint8Array(event.data.buffer);
    switch(d[0]){
        case 0x01: { log(`Ping OK. VIA protocol version: ${(d[1]<<8)|d[2]}`); break; }
        case 0x08: {
            const vid = d[2];
            const payload = d.slice(3);
            handleGet(vid, payload);
            break;
        }
        case 0xFF: {
            log(`ERROR: id_unhandled. Firmware rejected command.`);
            setStatus('Command rejected. Re-check firmware.');
            break;
        }
    }
}

function handleGet(vid, payload){
    if(vid === 1){ mode = payload[0]; updateModeDisplay(); return; }
    if(payload.length < 2) return;
    const row = payload[0], col = payload[1];
    if(selectedRC && (selectedRC[0] !== row || selectedRC[1] !== col)) return;
    if(vid === 15 && payload.length >= 6){
        // Per-key calibration data: noise_ceiling, bottoming_reading
        const noise  = payload[2] | (payload[3] << 8);
        const bottom = payload[4] | (payload[5] << 8);
        selectedCalib = { noise, bottom, travel: noise - bottom };
        vlog(`key r${row}c${col} calib: noise=${noise} bottom=${bottom} travel=${selectedCalib.travel}`);
        // Update RT offset slider max to reflect true travel range
        const mp = rtMaxPct();
        cfg.actOff.max = mp; cfg.relOff.max = mp;
        // Re-fetch RT offsets now that we have travel range
        customGet(6, row, col);
        customGet(7, row, col);
        return;
    }
    if(vid === 2 && payload.length >= 4){
        const raw = payload[2] | (payload[3] << 8);
        setSliderPct(cfg.act, cfg.actDisp, raw16ToPct(raw));
    } else if(vid === 3 && payload.length >= 4){
        const raw = payload[2] | (payload[3] << 8);
        setSliderPct(cfg.rel, cfg.relDisp, raw16ToPct(raw));
    } else if(vid === 5 && payload.length >= 4){
        const raw = payload[2] | (payload[3] << 8);
        setSliderPct(cfg.dz, cfg.dzDisp, raw16ToPct(raw));
    } else if(vid === 6 && payload.length >= 3){
        setSliderPct(cfg.actOff, cfg.actOffDisp, rtRawToPct(payload[2]));
    } else if(vid === 7 && payload.length >= 3){
        setSliderPct(cfg.relOff, cfg.relOffDisp, rtRawToPct(payload[2]));
    } else if(vid === 16 && payload.length >= 4){
        const raw = payload[2] | (payload[3] << 8);
        setSliderPct(cfg.bdz, cfg.bdzDisp, raw16ToPct(raw));
    }
}

function setSliderPct(slider, disp, pct){
    slider.value = pct;
    disp.textContent = Math.round(pct) + '%';
}

// === Console parsing ===
let consoleBuf='';
let parseMode=null;
let streamRows=[];
let stateRows=[];
let rowIdx=0;

function onConsole(event){
    const u8 = new Uint8Array(event.data.buffer);
    const txt = new TextDecoder().decode(u8).replace(/\0/g,'');
    consoleBuf += txt;
    let nl;
    while((nl = consoleBuf.indexOf('\n')) >= 0){
        const line = consoleBuf.slice(0, nl).trim();
        consoleBuf = consoleBuf.slice(nl+1);
        parseLine(line);
    }
}

function parseLine(line){
    if(line === 'MATRIX_STREAM:'){ parseMode='stream'; rowIdx=0; streamRows=[]; return; }
    if(line === 'MATRIX_STATE:'){ parseMode='state'; rowIdx=0; stateRows=[]; return; }
    if(!parseMode){ vlog('KB: '+line); return; }
    if(!line.includes(',')){ return; }
    const nums = line.split(',').filter(x=>x!=='').map(Number);
    if(parseMode==='stream'){
        streamRows.push(nums); rowIdx++;
        if(rowIdx>=3){ applyStream(streamRows); parseMode=null; }
    } else if(parseMode==='state'){
        stateRows.push(nums); rowIdx++;
        if(rowIdx>=3){ applyState(stateRows); parseMode=null; }
    }
}

function applyStream(rows){
    const ADC_MAX = 1023;
    const isRight = currentHalf === 'right';
    for(let r=0;r<3;r++) for(let c=0;c<5;c++){
        const v = rows[r]?.[c];
        if(v===undefined || v===-1) continue;
        const gridCol = isRight ? 4-c : c;
        const k = masterKeys[r*5+gridCol];
        k._val.textContent = v;
        k._fill.style.height = `${Math.min(100, Math.max(0, v*100/ADC_MAX))}%`;
    }
    for(let r=0;r<3;r++){
        const v = rows[r]?.[5];
        if(v===undefined || v===-1) continue;
        // Right half: thumb row order is reversed (row 0 = rightmost, row 2 = leftmost)
        const thumbIdx = isRight ? 2-r : r;
        const k = masterKeys[15+thumbIdx];
        k._val.textContent = v;
        k._fill.style.height = `${Math.min(100, Math.max(0, v*100/ADC_MAX))}%`;
    }
}

function applyState(rows){
    const isRight = currentHalf === 'right';
    for(let r=0;r<3;r++) for(let c=0;c<5;c++){
        const gridCol = isRight ? 4-c : c;
        masterKeys[r*5+gridCol].classList.toggle('pressed', !!rows[r]?.[c]);
    }
    for(let r=0;r<3;r++){
        const thumbIdx = isRight ? 2-r : r;
        masterKeys[15+thumbIdx].classList.toggle('pressed', !!rows[r]?.[5]);
    }
}

// === Per-key config panel ===
const cfg = {};
function buildCfgPanel(){
    const pnl = document.createElement('div');
    pnl.className='cfg-panel';
    pnl.innerHTML = `
        <div style="font-size:13px;color:#4ade80;margin-bottom:6px;font-weight:bold">Per-Key Config (percentage of travel)</div>
        <div style="font-size:11px;color:#888;margin-bottom:8px">Click a key to select. Drag sliders to tune. Values sent live to firmware. Apply to All copies this key to every key. Save writes to EEPROM.</div>
        <div class="cfg-row"><label>Selected key</label><span id="sel-label" style="color:#f59e0b;font-weight:bold">(none)</span></div>
        <div class="cfg-row"><label>APC Actuation Point (% of travel)</label><input type="range" id="cfg-act" min="0" max="100" step="1" value="29"><span class="val-cell" id="cfg-act-disp">29%</span></div>
        <div class="cfg-row"><label>APC Release Point (% of travel)</label><input type="range" id="cfg-rel" min="0" max="100" step="1" value="20"><span class="val-cell" id="cfg-rel-disp">20%</span></div>
        <div class="cfg-row"><label>RT Initial Deadzone (% of travel)</label><input type="range" id="cfg-dz" min="0" max="100" step="1" value="29"><span class="val-cell" id="cfg-dz-disp">29%</span></div>
        <div class="cfg-row"><label>RT Actuation Offset (% of travel)</label><input type="range" id="cfg-actoff" min="1" max="100" step="1" value="7"><span class="val-cell" id="cfg-actoff-disp">7%</span></div>
        <div class="cfg-row"><label>RT Release Offset (% of travel)</label><input type="range" id="cfg-reloff" min="1" max="100" step="1" value="5"><span class="val-cell" id="cfg-reloff-disp">5%</span></div>
        <div class="cfg-row"><label>Bottom Deadzone (% from bottom, 0=off)</label><input type="range" id="cfg-bdz" min="0" max="50" step="1" value="5"><span class="val-cell" id="cfg-bdz-disp">5%</span></div>
        <div class="apply-row">
            <button id="btn-apply-all">Apply to All Keys</button>
            <button id="btn-fetch">Fetch Selected From KB</button>
        </div>
    `;
    document.body.appendChild(pnl);
    cfg.act = document.getElementById('cfg-act'); cfg.actDisp = document.getElementById('cfg-act-disp');
    cfg.rel = document.getElementById('cfg-rel'); cfg.relDisp = document.getElementById('cfg-rel-disp');
    cfg.dz = document.getElementById('cfg-dz'); cfg.dzDisp = document.getElementById('cfg-dz-disp');
    cfg.actOff = document.getElementById('cfg-actoff'); cfg.actOffDisp = document.getElementById('cfg-actoff-disp');
    cfg.relOff = document.getElementById('cfg-reloff'); cfg.relOffDisp = document.getElementById('cfg-reloff-disp');
    cfg.bdz = document.getElementById('cfg-bdz'); cfg.bdzDisp = document.getElementById('cfg-bdz-disp');
    cfg.selLabel = document.getElementById('sel-label');

    // Debounced send helper
    const debounceTimers = {};
    function debounceSend(vid, rawVal, is8bit){
        clearTimeout(debounceTimers[vid]);
        debounceTimers[vid] = setTimeout(() => {
            if(!selectedRC) return;
            const [r,c] = selectedRC;
            if(is8bit){
                customSet(vid, r, c, rawVal & 0xFF);
            } else {
                customSet(vid, r, c, rawVal & 0xFF, (rawVal >> 8) & 0xFF);
            }
        }, 120);
    }

    cfg.act.oninput = () => { const pct = parseInt(cfg.act.value); cfg.actDisp.textContent = pct+'%'; debounceSend(2, pctToRaw16(pct), false); };
    cfg.rel.oninput = () => { const pct = parseInt(cfg.rel.value); cfg.relDisp.textContent = pct+'%'; debounceSend(3, pctToRaw16(pct), false); };
    cfg.dz.oninput  = () => { const pct = parseInt(cfg.dz.value); cfg.dzDisp.textContent = pct+'%'; debounceSend(5, pctToRaw16(pct), false); };
    cfg.actOff.oninput = () => { const pct = parseInt(cfg.actOff.value); cfg.actOffDisp.textContent = pct+'%'; debounceSend(6, rtPctToRaw(pct), true); };
    cfg.relOff.oninput = () => { const pct = parseInt(cfg.relOff.value); cfg.relOffDisp.textContent = pct+'%'; debounceSend(7, rtPctToRaw(pct), true); };
    cfg.bdz.oninput = () => { const pct = parseInt(cfg.bdz.value); cfg.bdzDisp.textContent = pct+'%'; debounceSend(16, pctToRaw16(pct), false); };

    document.getElementById('btn-apply-all').onclick = () => {
        if(!selectedRC){ log('Pick a key first'); return; }
        customSet(13, selectedRC[0], selectedRC[1]);
        log(`Key r${selectedRC[0]}c${selectedRC[1]} → all keys`);
    };
    document.getElementById('btn-fetch').onclick = () => {
        if(!selectedRC){ log('Pick a key first'); return; }
        fetchSelected();
    };
}

function fetchSelected(){
    if(!selectedRC) return;
    // Fetch calib first (noise/bottoming) — handleGet will then fetch RT offsets
    // so their percentage display uses the correct travel range.
    customGet(15, selectedRC[0], selectedRC[1]);
    // Fetch thresholds in parallel (these don't depend on travel range)
    customGet(2, selectedRC[0], selectedRC[1]);
    customGet(3, selectedRC[0], selectedRC[1]);
    customGet(5, selectedRC[0], selectedRC[1]);
    customGet(16, selectedRC[0], selectedRC[1]);
}

function selectKey(row, col){
    selectedRC = [row, col];
    cfg.selLabel.textContent = `r${row}c${col}`;
    masterKeys.forEach(k => k.classList.remove('selected'));
    const idx = (col===5) ? 15+row : row*5+col;
    if(masterKeys[idx]) masterKeys[idx].classList.add('selected');
    fetchSelected();
}

buildCfgPanel();
</script>
</body>
</html>
